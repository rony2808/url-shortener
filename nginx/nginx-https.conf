# HTTPS version — enable manually after generating the certbot certificate.
# See the "HTTPS setup" section of the README.

# HTTP: redirect all traffic to HTTPS
server {
    listen 80;
    server_name rony-urlshortener.duckdns.org;
    return 301 https://$host$request_uri;
}

# HTTPS: serve the application with the TLS certificate
server {
    listen 443 ssl;
    server_name rony-urlshortener.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/rony-urlshortener.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rony-urlshortener.duckdns.org/privkey.pem;

    location / {
        proxy_pass http://flask:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
